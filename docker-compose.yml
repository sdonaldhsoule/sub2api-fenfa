services:
  app:
    build:
      context: .
      target: dev
    working_dir: /workspace
    init: true
    command: npm run dev
    env_file:
      - .env.docker
    environment:
      CHOKIDAR_USEPOLLING: 'true'
      WATCHPACK_POLLING: 'true'
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/welfare
      WELFARE_FRONTEND_URL: http://localhost:5173
      WELFARE_CORS_ORIGINS: http://localhost:5173
      VITE_WELFARE_API_BASE: http://localhost:8787
      VITE_WELFARE_APP_BASE: /
    volumes:
      - .:/workspace
      - backend_node_modules:/workspace/welfare-backend/node_modules
      - frontend_node_modules:/workspace/welfare-frontend/node_modules
    ports:
      - '5173:5173'
      - '8787:8787'
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: welfare
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d welfare']
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  backend_node_modules:
  frontend_node_modules:
  postgres_data:
